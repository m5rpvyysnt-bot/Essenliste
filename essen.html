<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kinder Essensübersicht</title>
<style>
  :root {
    --bg: #fff8ed;
    --card: #ffffff;
    --text: #253238;
    --muted: #6b7280;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --orange: #f97316;
    --shadow: 0 10px 30px rgba(0,0,0,0.10);
    --radius: 22px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #fff8ed, #eef7ff);
    color: var(--text);
    min-height: 100vh;
    padding: 18px;
  }

  header {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 18px;
    display: grid;
    gap: 14px;
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    text-align: center;
  }

  .topStats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .stat {
    border-radius: 18px;
    padding: 14px;
    text-align: center;
    background: #f3f4f6;
    font-weight: 800;
  }

  .stat span {
    display: block;
    font-size: 2rem;
    margin-top: 4px;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 150px 150px;
    gap: 10px;
  }

  input, select, button {
    font-size: 1rem;
    border-radius: 16px;
    border: 2px solid #e5e7eb;
    padding: 14px;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--blue);
  }

  button {
    border: none;
    font-weight: 800;
    cursor: pointer;
    color: white;
    transition: transform 0.1s ease, opacity 0.2s ease;
  }

  button:active {
    transform: scale(0.97);
  }

  .addBtn { background: var(--green); }
  .resetBtn { background: var(--orange); }
  .deleteBtn { background: var(--red); }
  .moveBtn { background: var(--blue); }
  .smallBtn { padding: 9px 11px; font-size: 0.85rem; }

  .groups {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .group {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    min-height: 300px;
  }

  .groupHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .group h2 {
    font-size: 1.5rem;
  }

  .badge {
    background: #eef2ff;
    color: #3730a3;
    padding: 8px 12px;
    border-radius: 999px;
    font-weight: 900;
  }

  .groupInput {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    margin-bottom: 14px;
  }

  .childList {
    display: grid;
    gap: 10px;
  }

  .child {
    display: grid;
    grid-template-columns: 54px 1fr auto auto;
    align-items: center;
    gap: 8px;
    background: #f9fafb;
    border: 2px solid #e5e7eb;
    border-radius: 18px;
    padding: 10px;
  }

  .child.present {
    background: #ecfdf5;
    border-color: #86efac;
  }

  .check {
    width: 42px;
    height: 42px;
    accent-color: var(--green);
  }

  .name {
    font-size: 1.15rem;
    font-weight: 800;
    word-break: break-word;
  }

  .empty {
    color: var(--muted);
    text-align: center;
    padding: 26px 10px;
    border: 2px dashed #d1d5db;
    border-radius: 18px;
  }

  .footerActions {
    margin-top: 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .hint {
    color: var(--muted);
    text-align: center;
    font-size: 0.95rem;
  }

  @media (max-width: 800px) {
    .topStats, .groups, .controls, .footerActions {
      grid-template-columns: 1fr;
    }

    .child {
      grid-template-columns: 48px 1fr;
    }

    .childActions {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
  }
</style>
</head>
<body>

<header>
  <h1>🍽️ Kinder Essensübersicht</h1>

  <div class="topStats">
    <div class="stat">Gruppe 1 da<span id="countGroup1">0</span></div>
    <div class="stat">Gruppe 2 da<span id="countGroup2">0</span></div>
    <div class="stat">Gesamt da<span id="countTotal">0</span></div>
  </div>

  <p class="hint">Trage die Namen direkt in der passenden Gruppe ein.</p>

  <p class="hint">Die Namen bleiben gespeichert. Für einen neuen Tag nur die Haken zurücksetzen.</p>
</header>

<main class="groups">
  <section class="group">
    <div class="groupHeader">
      <h2>Gruppe 1</h2>
      <div class="badge"><span id="totalGroup1">0</span> Kinder</div>
    </div>
    <div class="groupInput">
      <input id="childNameGroup1" type="text" placeholder="Name für Gruppe 1" autocomplete="off" />
      <button class="addBtn" onclick="addChild(1)">+ Hinzufügen</button>
    </div>
    <div id="listGroup1" class="childList"></div>
  </section>

  <section class="group">
    <div class="groupHeader">
      <h2>Gruppe 2</h2>
      <div class="badge"><span id="totalGroup2">0</span> Kinder</div>
    </div>
    <div class="groupInput">
      <input id="childNameGroup2" type="text" placeholder="Name für Gruppe 2" autocomplete="off" />
      <button class="addBtn" onclick="addChild(2)">+ Hinzufügen</button>
    </div>
    <div id="listGroup2" class="childList"></div>
  </section>
</main>

<div class="footerActions">
  <button class="resetBtn" onclick="resetDay()">🔄 Neuer Tag: alle Haken entfernen</button>
  <button class="deleteBtn" onclick="deleteAllChildren()">🗑️ Alle Namen löschen</button>
</div>

<script>
  const STORAGE_KEY = "kinderEssensuebersichtProfi";

  let children = loadChildren();

  function loadChildren() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return [];

    try {
      return JSON.parse(saved);
    } catch {
      return [];
    }
  }

  function saveChildren() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(children));
  }

  function addChild(groupNumber) {
    const input = document.getElementById(`childNameGroup${groupNumber}`);
    const name = input.value.trim();

    if (!name) return;

    children.push({
      id: Date.now().toString(),
      name: name,
      group: String(groupNumber),
      present: false
    });

    input.value = "";
    input.focus();
    saveChildren();
    render();
  }

  function togglePresent(id) {
    const child = children.find(c => c.id === id);
    if (!child) return;

    child.present = !child.present;
    saveChildren();
    render();
  }

  function moveChild(id) {
    const child = children.find(c => c.id === id);
    if (!child) return;

    child.group = child.group === "1" ? "2" : "1";
    saveChildren();
    render();
  }

  function deleteChild(id) {
    const child = children.find(c => c.id === id);
    if (!child) return;

    const ok = confirm(`Soll ${child.name} wirklich gelöscht werden?`);
    if (!ok) return;

    children = children.filter(c => c.id !== id);
    saveChildren();
    render();
  }

  function resetDay() {
    children = children.map(child => ({ ...child, present: false }));
    saveChildren();
    render();
  }

  function deleteAllChildren() {
    const ok = confirm("Wirklich alle Namen löschen? Diese Aktion kann nicht rückgängig gemacht werden.");
    if (!ok) return;

    children = [];
    saveChildren();
    render();
  }

  function renderGroup(groupNumber) {
    const list = document.getElementById(`listGroup${groupNumber}`);
    const groupChildren = children
      .filter(child => child.group === String(groupNumber))
      .sort((a, b) => a.name.localeCompare(b.name, "de"));

    list.innerHTML = "";

    if (groupChildren.length === 0) {
      list.innerHTML = `<div class="empty">Noch keine Kinder in Gruppe ${groupNumber}</div>`;
      return;
    }

    groupChildren.forEach(child => {
      const row = document.createElement("div");
      row.className = `child ${child.present ? "present" : ""}`;

      row.innerHTML = `
        <input class="check" type="checkbox" ${child.present ? "checked" : ""} aria-label="${child.name} anwesend">
        <div class="name">${escapeHtml(child.name)}</div>
        <div class="childActions">
          <button class="moveBtn smallBtn" type="button">Gruppe wechseln</button>
          <button class="deleteBtn smallBtn" type="button">Löschen</button>
        </div>
      `;

      row.querySelector(".check").addEventListener("change", () => togglePresent(child.id));
      row.querySelector(".moveBtn").addEventListener("click", () => moveChild(child.id));
      row.querySelector(".deleteBtn").addEventListener("click", () => deleteChild(child.id));

      list.appendChild(row);
    });
  }

  function updateCounts() {
    const group1 = children.filter(c => c.group === "1");
    const group2 = children.filter(c => c.group === "2");
    const present1 = group1.filter(c => c.present).length;
    const present2 = group2.filter(c => c.present).length;

    document.getElementById("countGroup1").textContent = present1;
    document.getElementById("countGroup2").textContent = present2;
    document.getElementById("countTotal").textContent = present1 + present2;

    document.getElementById("totalGroup1").textContent = group1.length;
    document.getElementById("totalGroup2").textContent = group2.length;
  }

  function render() {
    renderGroup(1);
    renderGroup(2);
    updateCounts();
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  document.getElementById("childNameGroup1").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      addChild(1);
    }
  });

  document.getElementById("childNameGroup2").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      addChild(2);
    }
  });

  render();
</script>
</body>
</html>
