<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essensgruppen</title>
  <style>
    :root {
      --group1: #FF6B6B;
      --group1-light: #FFE5E5;
      --group2: #4ECDC4;
      --group2-light: #E0F7F6;
      --bg: #FFF9F0;
      --text: #2D3436;
      --muted: #999;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px 14px 50px;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 0.9rem;
    }

    .groups {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      max-width: 900px;
      margin: 0 auto 22px;
    }

    @media (max-width: 700px) {
      .groups {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .group1 .header {
      background: var(--group1-light);
      border-bottom: 3px solid var(--group1);
    }

    .group2 .header {
      background: var(--group2-light);
      border-bottom: 3px solid var(--group2);
    }

    .title-input {
      font-size: 1.25rem;
      font-weight: bold;
      border: 0;
      background: transparent;
      outline: none;
      width: 70%;
    }

    .badge {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 1.4rem;
      font-weight: bold;
      flex-shrink: 0;
    }

    .group1 .badge {
      background: var(--group1);
    }

    .group2 .badge {
      background: var(--group2);
    }

    .body {
      padding: 14px;
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .name-input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 999px;
      border: 2px solid #eee;
      font-size: 1rem;
      outline: none;
      min-width: 0;
    }

    .add-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 0;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      flex-shrink: 0;
    }

    .group1 .add-btn {
      background: var(--group1);
    }

    .group2 .add-btn {
      background: var(--group2);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .child {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f7f7f7;
      border-radius: 14px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
    }

    .group1 .child.present {
      background: var(--group1-light);
    }

    .group2 .child.present {
      background: var(--group2-light);
    }

    .check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      flex-shrink: 0;
    }

    .group1 .child.present .check {
      background: var(--group1);
      border-color: var(--group1);
    }

    .group2 .child.present .check {
      background: var(--group2);
      border-color: var(--group2);
    }

    .child-name {
      flex: 1;
      font-weight: bold;
      font-size: 1rem;
      min-width: 0;
      word-break: break-word;
    }

    .child:not(.present) .child-name {
      opacity: 0.55;
    }

    .delete {
      border: 0;
      background: transparent;
      color: #bbb;
      font-size: 1.1rem;
      padding: 4px 6px;
      cursor: pointer;
    }

    .empty {
      color: #bbb;
      text-align: center;
      padding: 10px;
      font-style: italic;
      font-size: 0.9rem;
    }

    .summary {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      justify-content: space-around;
      gap: 10px;
      text-align: center;
    }

    .summary-number {
      display: block;
      font-size: 2rem;
      font-weight: bold;
    }

    .summary-label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .reset-area {
      max-width: 900px;
      margin: 16px auto 0;
      display: flex;
      justify-content: center;
    }

    .reset-btn {
      border: 2px solid #eee;
      background: white;
      border-radius: 999px;
      padding: 12px 20px;
      font-weight: bold;
      color: #777;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>🍽️ Essensgruppen</h1>
  <p class="subtitle" id="dateDisplay"></p>

  <div class="groups">
    <section class="card group1">
      <div class="header">
        <input id="title1" class="title-input" value="Gruppe 1">
        <div id="badge1" class="badge">0</div>
      </div>
      <div class="body">
        <div class="add-row">
          <input id="input1" class="name-input" placeholder="Name eingeben...">
          <button class="add-btn" onclick="addChild(1)">+</button>
        </div>
        <div id="list1" class="list"></div>
        <div id="empty1" class="empty">Noch keine Kinder hinzugefügt</div>
      </div>
    </section>

    <section class="card group2">
      <div class="header">
        <input id="title2" class="title-input" value="Gruppe 2">
        <div id="badge2" class="badge">0</div>
      </div>
      <div class="body">
        <div class="add-row">
          <input id="input2" class="name-input" placeholder="Name eingeben...">
          <button class="add-btn" onclick="addChild(2)">+</button>
        </div>
        <div id="list2" class="list"></div>
        <div id="empty2" class="empty">Noch keine Kinder hinzugefügt</div>
      </div>
    </section>
  </div>

  <div class="summary">
    <div>
      <span id="sum1" class="summary-number">0</span>
      <span id="sumLabel1" class="summary-label">Gruppe 1</span>
    </div>
    <div>
      <span id="sum2" class="summary-number">0</span>
      <span id="sumLabel2" class="summary-label">Gruppe 2</span>
    </div>
    <div>
      <span id="sumTotal" class="summary-number">0</span>
      <span class="summary-label">Gesamt</span>
    </div>
  </div>

  <div class="reset-area">
    <button class="reset-btn" onclick="resetDay()">🔄 Alle Häkchen zurücksetzen</button>
  </div>

  <script>
    var state = {
      1: [],
      2: []
    };

    function showDate() {
      var now = new Date();
      var days = ['Sonntag', 'Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag'];
      document.getElementById('dateDisplay').textContent =
        days[now.getDay()] + ', ' + now.toLocaleDateString('de-DE');
    }

    function saveData() {
      try {
        localStorage.setItem('essensgruppen_data', JSON.stringify({
          state: state,
          title1: document.getElementById('title1').value,
          title2: document.getElementById('title2').value,
          date: new Date().toDateString()
        }));
      } catch (e) {
        console.log(e);
      }
    }

    function loadData() {
      showDate();

      try {
        var raw = localStorage.getItem('essensgruppen_data');
        if (!raw) {
          render(1);
          render(2);
          return;
        }

        var data = JSON.parse(raw);

        if (data.state) {
          state[1] = data.state[1] || [];
          state[2] = data.state[2] || [];
        }

        if (data.title1) {
          document.getElementById('title1').value = data.title1;
          document.getElementById('sumLabel1').textContent = data.title1;
        }

        if (data.title2) {
          document.getElementById('title2').value = data.title2;
          document.getElementById('sumLabel2').textContent = data.title2;
        }

        if (data.date !== new Date().toDateString()) {
          state[1].forEach(function(child) { child.present = false; });
          state[2].forEach(function(child) { child.present = false; });
          saveData();
        }
      } catch (e) {
        console.log(e);
      }

      render(1);
      render(2);
    }

    function addChild(group) {
      var input = document.getElementById('input' + group);
      var name = input.value.trim();

      if (name === '') return;

      state[group].push({
        name: name,
        present: false
      });

      input.value = '';
      render(group);
      saveData();
    }

    function toggleChild(group, index) {
      state[group][index].present = !state[group][index].present;
      render(group);
      saveData();
    }

    function deleteChild(group, index) {
      if (!confirm('Kind wirklich entfernen?')) return;
      state[group].splice(index, 1);
      render(group);
      saveData();
    }

    function resetDay() {
      if (!confirm('Alle Häkchen zurücksetzen?')) return;

      state[1].forEach(function(child) { child.present = false; });
      state[2].forEach(function(child) { child.present = false; });

      render(1);
      render(2);
      saveData();
    }

    function render(group) {
      var list = document.getElementById('list' + group);
      var empty = document.getElementById('empty' + group);

      list.innerHTML = '';

      if (state[group].length === 0) {
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
      }

      state[group].forEach(function(child, index) {
        var row = document.createElement('div');
        row.className = 'child' + (child.present ? ' present' : '');

        var check = document.createElement('div');
        check.className = 'check';
        check.textContent = child.present ? '✓' : '';

        var name = document.createElement('div');
        name.className = 'child-name';
        name.textContent = child.name;

        var del = document.createElement('button');
        del.className = 'delete';
        del.textContent = '✕';

        del.addEventListener('click', function(event) {
          event.stopPropagation();
          deleteChild(group, index);
        });

        row.addEventListener('click', function() {
          toggleChild(group, index);
        });

        row.appendChild(check);
        row.appendChild(name);
        row.appendChild(del);
        list.appendChild(row);
      });

      updateSummary();
    }

    function updateSummary() {
      var p1 = state[1].filter(function(child) { return child.present; }).length;
      var p2 = state[2].filter(function(child) { return child.present; }).length;

      document.getElementById('badge1').textContent = p1;
      document.getElementById('badge2').textContent = p2;
      document.getElementById('sum1').textContent = p1;
      document.getElementById('sum2').textContent = p2;
      document.getElementById('sumTotal').textContent = p1 + p2;
    }

    document.getElementById('title1').addEventListener('input', function() {
      document.getElementById('sumLabel1').textContent = this.value || 'Gruppe 1';
      saveData();
    });

    document.getElementById('title2').addEventListener('input', function() {
      document.getElementById('sumLabel2').textContent = this.value || 'Gruppe 2';
      saveData();
    });

    document.getElementById('input1').addEventListener('keydown', function(event) {
      if (event.key === 'Enter') addChild(1);
    });

    document.getElementById('input2').addEventListener('keydown', function(event) {
      if (event.key === 'Enter') addChild(2);
    });

    loadData();
  </script>
</body>
</html>
