<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Gruppenliste</title>
  <style>
    :root {
      --bg: #f7f3ea;
      --surface: #ffffff;
      --surface-2: #fbfaf6;
      --line: #e6dfd3;
      --text: #253033;
      --muted: #778184;
      --green: #2f9d68;
      --green-soft: #e6f5ed;
      --red: #d85b5b;
      --red-soft: #fdebea;
      --blue: #4d7fd6;
      --blue-soft: #e8effd;
      --amber: #c78624;
      --amber-soft: #fff3d9;
      --shadow: 0 6px 22px rgba(42, 35, 22, 0.08);
      --app-height: 100vh;
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      height: var(--app-height);
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      height: var(--app-height);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: calc(18px + env(safe-area-inset-top)) 14px calc(44px + env(safe-area-inset-bottom));
      scroll-padding: 120px 0;
    }

    .wrap {
      width: min(980px, 100%);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 1.8rem;
      line-height: 1.1;
    }

    .date {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .sync-status {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      margin-top: 4px;
    }

    .role-status {
      color: var(--blue);
      font-size: 0.82rem;
      font-weight: 900;
      margin-top: 4px;
    }

    .icon-button,
    .primary-button,
    .small-button {
      border: 0;
      border-radius: 8px;
      min-height: 42px;
      font-weight: 800;
      color: var(--text);
    }

    .icon-button {
      width: 44px;
      background: var(--surface);
      box-shadow: var(--shadow);
      font-size: 1.15rem;
    }

    .primary-button {
      background: var(--text);
      color: white;
      padding: 0 16px;
    }

    .small-button {
      background: var(--surface-2);
      border: 1px solid var(--line);
      min-height: 36px;
      padding: 0 12px;
      font-size: 0.9rem;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .summary-card,
    .meal-card,
    .group-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .summary-card {
      padding: 12px 10px;
      min-width: 0;
    }

    .summary-number {
      display: block;
      font-size: 1.75rem;
      font-weight: 900;
      line-height: 1;
    }

    .summary-label {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .meal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .kitchen-panel {
      display: none;
      gap: 10px;
      margin-bottom: 14px;
    }

    .kitchen-panel.visible {
      display: grid;
    }

    .kitchen-area {
      background: var(--surface);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .kitchen-area-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      background: var(--soft);
      border-bottom: 1px solid var(--line);
      font-weight: 900;
    }

    .kitchen-meals {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
    }

    .kitchen-meal {
      border-radius: 8px;
      padding: 10px;
      background: var(--soft);
      display: grid;
      grid-template-columns: 1fr;
      justify-items: center;
      gap: 8px;
      font-weight: 900;
      text-align: center;
    }

    .kitchen-meal strong {
      width: 58px;
      height: 58px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: white;
      color: var(--blue);
      font-size: 1.55rem;
      line-height: 1;
      border: 2px solid var(--blue-soft);
    }

    .kitchen-rows {
      display: grid;
    }

    .kitchen-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .kitchen-row:last-child {
      border-bottom: 0;
    }

    .kitchen-count {
      min-width: 48px;
      min-height: 48px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--amber-soft);
      color: var(--amber);
      font-size: 1.45rem;
      font-weight: 900;
    }

    .meal-card {
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .meal-title {
      font-weight: 900;
      font-size: 1.05rem;
    }

    .meal-sub {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 2px;
    }

    .meal-count {
      min-width: 58px;
      min-height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1.85rem;
      font-weight: 900;
    }

    .meal-1 .meal-count {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .meal-2 .meal-count {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 12px 0;
      flex-wrap: wrap;
    }

    .mode-tabs {
      display: flex;
      gap: 6px;
      padding: 4px;
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .tab {
      border: 0;
      min-height: 34px;
      border-radius: 6px;
      padding: 0 12px;
      background: transparent;
      color: var(--muted);
      font-weight: 900;
    }

    .tab.active {
      background: var(--text);
      color: white;
    }

    .group-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      align-items: start;
      gap: 12px;
    }

    .group-card {
      overflow: hidden;
    }

    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--line);
    }

    .group-toggle {
      flex: 1;
      min-width: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      text-align: left;
    }

    .group-toggle-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: white;
      border: 1px solid var(--line);
      flex-shrink: 0;
      font-weight: 900;
    }

    .group-name {
      font-size: 1.12rem;
      font-weight: 900;
    }

    .group-counts {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 0.78rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .pill.present { background: var(--green-soft); color: var(--green); }
    .pill.absent { background: var(--red-soft); color: var(--red); }
    .pill.picked { background: var(--blue-soft); color: var(--blue); }

    .children {
      display: grid;
      gap: 1px;
      background: var(--line);
    }

    .group-card.collapsed .children {
      display: none;
    }

    .child-row {
      display: grid;
      grid-template-columns: minmax(90px, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      background: var(--surface);
      padding: 10px;
      min-height: 76px;
    }

    .child-main {
      min-width: 0;
    }

    .child-name {
      display: block;
      font-size: 1.05rem;
      font-weight: 900;
      line-height: 1.2;
      word-break: break-word;
    }

    .child-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 5px;
    }

    .meal-badge,
    .note-badge,
    .note-preview {
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 0.75rem;
      font-weight: 900;
      background: var(--surface-2);
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .note-preview {
      max-width: min(320px, 100%);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--blue);
      background: var(--blue-soft);
      border-color: rgba(77, 127, 214, 0.25);
    }

    .status-buttons {
      display: grid;
      grid-template-columns: repeat(3, 54px);
      gap: 8px;
    }

    .status-button {
      width: 54px;
      height: 54px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: white;
      font-size: 1.25rem;
      font-weight: 900;
    }

    .child-edit-button {
      min-width: 54px;
      height: 54px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
      font-size: 1.2rem;
      font-weight: 900;
    }

    .status-button.active.present {
      background: var(--green-soft);
      border-color: var(--green);
      color: var(--green);
    }

    .status-button.active.absent {
      background: var(--red-soft);
      border-color: var(--red);
      color: var(--red);
    }

    .status-button.active.picked {
      background: var(--blue-soft);
      border-color: var(--blue);
      color: var(--blue);
    }

    .edit-panel {
      display: none;
      gap: 10px;
      margin-bottom: 12px;
      padding: 12px;
      background: var(--surface);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .edit-panel.visible {
      display: grid;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    label {
      font-size: 0.78rem;
      font-weight: 900;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--text);
      min-height: 44px;
      padding: 10px 11px;
      outline: none;
      font-size: 1rem;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--blue);
    }

    .edit-list {
      display: grid;
      gap: 8px;
    }

    .link-list {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .link-row {
      display: grid;
      grid-template-columns: minmax(86px, auto) 1fr;
      gap: 8px;
      align-items: center;
    }

    .link-row span {
      font-weight: 900;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .link-row input {
      min-height: 38px;
      font-size: 0.86rem;
    }

    .edit-group {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface-2);
    }

    .edit-group-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid var(--line);
    }

    .collapse-button {
      width: 38px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      font-weight: 900;
    }

    .edit-group-body {
      display: grid;
      gap: 8px;
      padding: 8px;
    }

    .edit-group.collapsed .edit-group-body {
      display: none;
    }

    .edit-child {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .edit-child-actions {
      display: flex;
      gap: 6px;
    }

    .empty {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    .dialog-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      background: rgba(20, 24, 26, 0.35);
      z-index: 10;
    }

    .dialog-backdrop.visible {
      display: flex;
    }

    .dialog {
      width: min(520px, 100%);
      background: white;
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .dialog-title {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    @media (max-width: 720px) {
      .summary {
        grid-template-columns: repeat(2, 1fr);
      }

      .meal-grid,
      .field-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 1.55rem;
      }

      .edit-group-head {
        grid-template-columns: auto 1fr;
      }

      .edit-group-head .edit-child-actions {
        grid-column: 1 / -1;
        justify-content: flex-end;
      }

      .child-row {
        grid-template-columns: 1fr;
      }

      .status-buttons {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .status-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <div class="wrap">
      <header class="topbar">
        <div>
          <h1>&#128203; Gruppenliste</h1>
          <div class="date" id="dateText"></div>
          <div class="role-status" id="roleStatus"></div>
          <div class="sync-status" id="syncStatus">Lokal gespeichert</div>
        </div>
        <button class="icon-button" id="editToggle" type="button" title="Liste bearbeiten">&#9998;</button>
      </header>

      <section class="summary" aria-label="Tages&uuml;bersicht">
        <div class="summary-card">
          <span class="summary-number" id="sumPresent">0</span>
          <span class="summary-label">Da</span>
        </div>
        <div class="summary-card">
          <span class="summary-number" id="sumMeals">0</span>
          <span class="summary-label">Essen</span>
        </div>
        <div class="summary-card">
          <span class="summary-number" id="sumPicked">0</span>
          <span class="summary-label">Abgeholt</span>
        </div>
        <div class="summary-card">
          <span class="summary-number" id="sumAbsent">0</span>
          <span class="summary-label">Abwesend</span>
        </div>
      </section>

      <section class="meal-grid" aria-label="Essensgruppen">
        <article class="meal-card meal-1">
          <div>
            <div class="meal-title">Essensgruppe 1</div>
            <div class="meal-sub">Kinder, die heute mitessen</div>
          </div>
          <div class="meal-count" id="meal1">0</div>
        </article>
        <article class="meal-card meal-2">
          <div>
            <div class="meal-title">Essensgruppe 2</div>
            <div class="meal-sub">Kinder, die heute mitessen</div>
          </div>
          <div class="meal-count" id="meal2">0</div>
        </article>
      </section>

      <section class="kitchen-panel" id="kitchenPanel" aria-label="Küchenübersicht"></section>

      <section class="edit-panel" id="editPanel" aria-label="Stammliste bearbeiten">
        <div class="field-grid">
          <div class="field">
            <label for="newGroupName">Neue Gruppe</label>
            <input id="newGroupName" type="text" placeholder="z.B. Regenbogen" />
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button class="primary-button" id="addGroupBtn" type="button">Gruppe hinzuf&uuml;gen</button>
          </div>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="newChildName">Kind</label>
            <input id="newChildName" type="text" placeholder="Name" />
          </div>
          <div class="field">
            <label for="newChildGroup">Kindergarten-Gruppe</label>
            <select id="newChildGroup"></select>
          </div>
          <div class="field">
            <label for="newChildMeal">Essensgruppe</label>
            <select id="newChildMeal">
              <option value="1">Essensgruppe 1</option>
              <option value="2">Essensgruppe 2</option>
            </select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button class="primary-button" id="addChildBtn" type="button">Kind hinzuf&uuml;gen</button>
          </div>
        </div>

        <div class="edit-list" id="editList"></div>
        <div class="link-list" id="linkList"></div>
      </section>

      <div class="toolbar">
        <div class="mode-tabs" aria-label="Ansicht">
          <button class="tab active" type="button" data-filter="all">Alle</button>
          <button class="tab" type="button" data-filter="present">Da</button>
          <button class="tab" type="button" data-filter="absent">Abwesend</button>
          <button class="tab" type="button" data-filter="picked">Abgeholt</button>
        </div>
        <button class="small-button" id="resetDayBtn" type="button">Tag zur&uuml;cksetzen</button>
      </div>

      <section class="group-list" id="groupList" aria-label="Gruppen"></section>
    </div>
  </main>

  <div class="dialog-backdrop" id="noteDialog" role="dialog" aria-modal="true" aria-labelledby="noteTitle">
    <div class="dialog">
      <h2 class="dialog-title" id="noteTitle">Notiz</h2>
      <div class="field">
        <label for="noteText">Notiz zum Kind</label>
        <textarea id="noteText" placeholder="z.B. Oma holt ab, geht fr&uuml;her, Besonderheit beim Essen"></textarea>
      </div>
      <div class="dialog-actions">
        <button class="small-button" id="deleteChildBtn" type="button">Kind l&ouml;schen</button>
        <button class="small-button" id="closeNoteBtn" type="button">Schlie&szlig;en</button>
        <button class="primary-button" id="saveNoteBtn" type="button">Speichern</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'kindergarten-gruppenliste-v1';
    const API_URL = '/api/state';
    const params = new URLSearchParams(window.location.search);
    const requestedGroupKey = params.get('gruppe') || params.get('group') || '';
    const requestedAreaKey = params.get('bereich') || params.get('area') || '';
    const requestedView = (params.get('ansicht') || params.get('view') || '').toLowerCase();
    const isKitchenMode = requestedView === 'kueche' || requestedView === 'küche' || requestedView === 'kitchen';
    const isAreaMode = !isKitchenMode && !!requestedAreaKey;
    const isGroupMode = !isKitchenMode && !isAreaMode && !!requestedGroupKey;
    const AREAS = [
      { key: 'bereich-1', name: 'Bereich 1', color: 'grün', groups: ['sternschnuppen', 'pusteblumen'] },
      { key: 'bereich-2', name: 'Bereich 2', color: 'blau', groups: ['regenbogen', 'wolkenkinder'] },
      { key: 'bereich-3', name: 'Bereich 3', color: 'rot', groups: ['schmetterlinge', 'sonnenkafer'] },
      { key: 'bereich-4', name: 'Bereich 4', color: 'gelb', groups: ['stoppelhoppser', 'gluhwurmchen'] },
      { key: 'bereich-5', name: 'Bereich 5', color: 'orange', groups: ['ganseblumchen', 'grashupfer'] }
    ];
    const DEFAULT_DATA = {
      lastReset: todayKey(),
      groups: [
        {
          id: uid(),
          name: 'Gruppe 1',
          children: [
            { id: uid(), name: 'Beispielkind 1', status: 'absent', mealGroup: '1', eats: true, note: '' },
            { id: uid(), name: 'Beispielkind 2', status: 'absent', mealGroup: '2', eats: true, note: '' }
          ]
        },
        {
          id: uid(),
          name: 'Gruppe 2',
          children: [
            { id: uid(), name: 'Beispielkind 3', status: 'absent', mealGroup: '1', eats: true, note: '' }
          ]
        }
      ]
    };

    let data = normalizeData(loadData());
    let filter = 'all';
    let editing = false;
    let activeNote = null;
    let collapsedEditGroups = {};
    let collapsedGroups = {};
    let cloudAvailable = false;
    let lastRemoteUpdatedAt = 0;
    let saveTimer = null;

    const els = {
      app: document.getElementById('app'),
      dateText: document.getElementById('dateText'),
      roleStatus: document.getElementById('roleStatus'),
      syncStatus: document.getElementById('syncStatus'),
      editToggle: document.getElementById('editToggle'),
      editPanel: document.getElementById('editPanel'),
      kitchenPanel: document.getElementById('kitchenPanel'),
      groupList: document.getElementById('groupList'),
      editList: document.getElementById('editList'),
      newGroupName: document.getElementById('newGroupName'),
      newChildName: document.getElementById('newChildName'),
      newChildGroup: document.getElementById('newChildGroup'),
      newChildMeal: document.getElementById('newChildMeal'),
      addGroupBtn: document.getElementById('addGroupBtn'),
      addChildBtn: document.getElementById('addChildBtn'),
      linkList: document.getElementById('linkList'),
      resetDayBtn: document.getElementById('resetDayBtn'),
      noteDialog: document.getElementById('noteDialog'),
      noteTitle: document.getElementById('noteTitle'),
      noteText: document.getElementById('noteText'),
      closeNoteBtn: document.getElementById('closeNoteBtn'),
      saveNoteBtn: document.getElementById('saveNoteBtn'),
      deleteChildBtn: document.getElementById('deleteChildBtn')
    };

    function uid() {
      return 'id-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return clone(DEFAULT_DATA);
        const parsed = JSON.parse(raw);
        if (!parsed.groups || !Array.isArray(parsed.groups)) return clone(DEFAULT_DATA);
        return parsed;
      } catch (error) {
        return clone(DEFAULT_DATA);
      }
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function makeShareKey(name) {
      const base = (name || 'gruppe')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-|-$/g, '')
        .slice(0, 24) || 'gruppe';
      return base + '-' + Math.random().toString(36).slice(2, 8);
    }

    function slugify(value) {
      return (value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/ä/g, 'a')
        .replace(/ö/g, 'o')
        .replace(/ü/g, 'u')
        .replace(/ß/g, 'ss')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-|-$/g, '');
    }

    function areaForGroup(group) {
      if (group.areaKey) {
        const saved = AREAS.find(function(area) { return area.key === group.areaKey; });
        if (saved) return saved;
      }

      const groupSlug = slugify(group.name);
      return AREAS.find(function(area) {
        return area.groups.indexOf(groupSlug) !== -1;
      }) || null;
    }

    function normalizeData(value) {
      const normalized = value && value.groups ? value : clone(DEFAULT_DATA);
      normalized.groups.forEach(function(group) {
        if (!group.shareKey) group.shareKey = makeShareKey(group.name);
        if (!group.areaKey) {
          const area = areaForGroup(group);
          if (area) group.areaKey = area.key;
        }
        group.children.forEach(function(child) {
          if (!child.id) child.id = uid();
          if (!child.status) child.status = 'absent';
          if (!child.mealGroup) child.mealGroup = '1';
          if (child.eats === undefined) child.eats = true;
          if (child.note === undefined) child.note = '';
        });
      });
      return normalized;
    }

    function formatName(name) {
      return name
        .trim()
        .split(/\s+/)
        .map(function(part) {
          if (!part) return '';
          return part.charAt(0).toLocaleUpperCase('de-DE') + part.slice(1);
        })
        .join(' ');
    }

    function setSyncStatus(text) {
      els.syncStatus.textContent = text;
    }

    function saveData(options) {
      const shouldSync = !options || options.sync !== false;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      if (shouldSync) {
        queueCloudSave();
      }
    }

    function queueCloudSave() {
      if (saveTimer) clearTimeout(saveTimer);
      setSyncStatus('Speichere...');
      saveTimer = setTimeout(saveCloudData, 350);
    }

    async function saveCloudData() {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: data })
        });
        if (!response.ok) throw new Error('Cloud-Speichern fehlgeschlagen');
        const result = await response.json();
        cloudAvailable = true;
        lastRemoteUpdatedAt = result.updatedAt || Date.now();
        setSyncStatus('Online synchronisiert');
      } catch (error) {
        cloudAvailable = false;
        setSyncStatus('Nur lokal gespeichert');
      }
    }

    async function loadCloudData() {
      try {
        const response = await fetch(API_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error('Cloud-Laden fehlgeschlagen');
        const result = await response.json();
        cloudAvailable = true;
        if (result.data && result.updatedAt && result.updatedAt !== lastRemoteUpdatedAt) {
          data = normalizeData(result.data);
          lastRemoteUpdatedAt = result.updatedAt;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          resetIfNewDay(false);
          render();
        } else if (!result.data) {
          await saveCloudData();
        }
        setSyncStatus('Online synchronisiert');
      } catch (error) {
        cloudAvailable = false;
        setSyncStatus('Nur lokal gespeichert');
      }
    }

    async function pollCloudData() {
      if (document.hidden) return;
      if (editing || activeNote) return;
      await loadCloudData();
    }

    function isSmallScreen() {
      return window.matchMedia('(max-width: 720px)').matches;
    }

    function applyMobileDefaults() {
      if (!isSmallScreen()) return;
      filter = 'absent';
      document.querySelectorAll('.tab').forEach(function(tab) {
        tab.classList.toggle('active', tab.dataset.filter === filter);
      });
      getVisibleGroups().forEach(function(group) {
        collapsedGroups[group.id] = true;
      });
    }

    function getVisibleGroups() {
      if (isKitchenMode) return data.groups;
      if (isAreaMode) {
        return data.groups.filter(function(group) {
          return groupBelongsToArea(group, requestedAreaKey);
        });
      }
      if (!isGroupMode) return data.groups;
      return data.groups.filter(function(group) {
        return group.shareKey === requestedGroupKey || group.id === requestedGroupKey;
      });
    }

    function canManageGroup(group) {
      if (isKitchenMode) return false;
      if (isAreaMode) {
        return groupBelongsToArea(group, requestedAreaKey);
      }
      if (!isGroupMode) return true;
      return group.shareKey === requestedGroupKey || group.id === requestedGroupKey;
    }

    function isAdminMode() {
      return !isKitchenMode && !isAreaMode && !isGroupMode;
    }

    function roleLabel() {
      if (isKitchenMode) return 'Küchenansicht';
      if (isAreaMode) {
        const area = AREAS.find(function(item) { return item.key === requestedAreaKey; });
        return area ? area.name + ' (' + area.color + ')' : 'Bereichslink nicht gefunden';
      }
      if (isGroupMode) {
        const group = getVisibleGroups()[0];
        return group ? 'Gruppenansicht: ' + group.name : 'Gruppenlink nicht gefunden';
      }
      return 'Adminansicht';
    }

    function linkFor(paramsText) {
      return window.location.origin + window.location.pathname + paramsText;
    }

    function groupBelongsToArea(group, areaKey) {
      const area = AREAS.find(function(item) { return item.key === areaKey; });
      if (!area) return false;
      if (group.areaKey === areaKey) return true;
      return area.groups.indexOf(slugify(group.name)) !== -1;
    }

    function updateAppHeight() {
      const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.documentElement.style.setProperty('--app-height', height + 'px');
    }

    function keepInputVisible(input) {
      setTimeout(function() {
        input.scrollIntoView({ block: 'center', inline: 'nearest', behavior: 'smooth' });
      }, 80);
    }

    function updateDate() {
      const formatter = new Intl.DateTimeFormat('de-DE', {
        weekday: 'long',
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      els.dateText.textContent = formatter.format(new Date());
    }

    function resetIfNewDay(sync) {
      if (data.lastReset === todayKey()) return;
      data.groups.forEach(function(group) {
        group.children.forEach(function(child) {
          child.status = 'absent';
        });
      });
      data.lastReset = todayKey();
      saveData({ sync: sync !== false });
    }

    function allChildren() {
      return getVisibleGroups().flatMap(function(group) {
        return group.children.map(function(child) {
          return { group: group, child: child };
        });
      });
    }

    function childCounts(children) {
      return {
        present: children.filter(function(child) { return child.status === 'present'; }).length,
        absent: children.filter(function(child) { return child.status === 'absent'; }).length,
        picked: children.filter(function(child) { return child.status === 'picked'; }).length
      };
    }

    function isMealRelevant(child) {
      return child.eats !== false && child.status !== 'absent';
    }

    function mealCountForGroup(group) {
      return group.children.filter(isMealRelevant).length;
    }

    function mealGroupCountForGroups(groups, mealGroup) {
      return groups.reduce(function(sum, group) {
        return sum + group.children.filter(function(child) {
          return isMealRelevant(child) && child.mealGroup === mealGroup;
        }).length;
      }, 0);
    }

    function areaUsesMealGroups(area) {
      return area.key !== 'bereich-4' && area.key !== 'bereich-5';
    }

    function groupUsesMealGroups(group) {
      const area = areaForGroup(group);
      return !area || areaUsesMealGroups(area);
    }

    function currentViewUsesMealGroups() {
      return getVisibleGroups().some(groupUsesMealGroups);
    }

    function renderSummary() {
      document.querySelector('.meal-grid').style.display =
        currentViewUsesMealGroups() ? 'grid' : 'none';
      const children = allChildren().map(function(item) { return item.child; });
      const counts = childCounts(children);
      const mealChildren = children.filter(isMealRelevant);
      document.getElementById('sumPresent').textContent = counts.present;
      document.getElementById('sumAbsent').textContent = counts.absent;
      document.getElementById('sumPicked').textContent = counts.picked;
      document.getElementById('sumMeals').textContent = mealChildren.length;
      document.getElementById('meal1').textContent = mealChildren.filter(function(child) { return child.mealGroup === '1'; }).length;
      document.getElementById('meal2').textContent = mealChildren.filter(function(child) { return child.mealGroup === '2'; }).length;
    }

    function renderKitchenPanel() {
      els.kitchenPanel.classList.toggle('visible', isKitchenMode);
      els.kitchenPanel.innerHTML = '';
      if (!isKitchenMode) return;

      AREAS.forEach(function(area) {
        const groups = data.groups.filter(function(group) {
          return groupBelongsToArea(group, area.key);
        });
        if (groups.length === 0) return;

        const areaTotal = groups.reduce(function(sum, group) {
          return sum + mealCountForGroup(group);
        }, 0);
        const meal1Total = mealGroupCountForGroups(groups, '1');
        const meal2Total = mealGroupCountForGroups(groups, '2');

        const card = document.createElement('article');
        card.className = 'kitchen-area';
        card.innerHTML =
          '<div class="kitchen-area-head"><span></span><span></span></div>' +
          '<div class="kitchen-rows"></div>';
        card.querySelector('.kitchen-area-head span:first-child').textContent = area.name + ' (' + area.color + ')';
        card.querySelector('.kitchen-area-head span:last-child').textContent = areaTotal + ' Essen';

        if (areaUsesMealGroups(area)) {
          const meals = document.createElement('div');
          meals.className = 'kitchen-meals';
          meals.innerHTML =
            '<div class="kitchen-meal"><span>Essensgruppe 1</span><strong></strong></div>' +
            '<div class="kitchen-meal"><span>Essensgruppe 2</span><strong></strong></div>';
          const mealBoxes = meals.querySelectorAll('.kitchen-meal strong');
          mealBoxes[0].textContent = meal1Total;
          mealBoxes[1].textContent = meal2Total;
          card.insertBefore(meals, card.querySelector('.kitchen-rows'));
        }

        const rows = card.querySelector('.kitchen-rows');
        groups.forEach(function(group) {
          const row = document.createElement('div');
          row.className = 'kitchen-row';
          row.innerHTML = '<strong></strong><span class="kitchen-count"></span>';
          row.querySelector('strong').textContent = group.name;
          row.querySelector('.kitchen-count').textContent = mealCountForGroup(group);
          rows.appendChild(row);
        });

        els.kitchenPanel.appendChild(card);
      });
    }

    function renderGroups() {
      els.groupList.innerHTML = '';
      els.groupList.style.display = isKitchenMode ? 'none' : 'grid';
      if (isKitchenMode) return;

      const groupsToRender = getVisibleGroups();

      if (groupsToRender.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = isAreaMode ? 'Keine Gruppen in diesem Bereich gefunden' : 'Keine Gruppen gefunden';
        els.groupList.appendChild(empty);
        return;
      }

      groupsToRender.forEach(function(group) {
        const visibleChildren = group.children.filter(function(child) {
          return filter === 'all' || child.status === filter;
        });
        const counts = childCounts(group.children);

        const isCollapsed = collapsedGroups[group.id] === true;
        const card = document.createElement('article');
        card.className = 'group-card' + (isCollapsed ? ' collapsed' : '');

        const head = document.createElement('div');
        head.className = 'group-head';
        head.innerHTML =
          '<button class="group-toggle" type="button"><span class="group-toggle-icon"></span><span class="group-name"></span></button>' +
          '<div class="group-counts">' +
          '<span class="pill present">Da ' + counts.present + '</span>' +
          '<span class="pill absent">Fehlt ' + counts.absent + '</span>' +
          '<span class="pill picked">Abgeholt ' + counts.picked + '</span>' +
          '</div>';
        head.querySelector('.group-name').textContent = group.name;
        head.querySelector('.group-toggle-icon').textContent = isCollapsed ? '+' : '-';
        head.querySelector('.group-toggle').addEventListener('click', function() {
          collapsedGroups[group.id] = !isCollapsed;
          renderGroups();
        });

        const list = document.createElement('div');
        list.className = 'children';

        if (visibleChildren.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'Keine Kinder in dieser Ansicht';
          list.appendChild(empty);
        }

        visibleChildren.forEach(function(child) {
          list.appendChild(renderChildRow(group.id, child));
        });

        card.appendChild(head);
        card.appendChild(list);
        els.groupList.appendChild(card);
      });
    }

    function renderChildRow(groupId, child) {
      const row = document.createElement('div');
      row.className = 'child-row';
      const group = data.groups.find(function(item) { return item.id === groupId; });
      const canEditChild = group && canManageGroup(group);

      const main = document.createElement('button');
      main.type = 'button';
      main.className = 'child-main';
      main.style.border = '0';
      main.style.background = 'transparent';
      main.style.textAlign = 'left';
      main.style.padding = '0';
      main.addEventListener('click', function() {
        if (!canEditChild) return;
        openNote(groupId, child.id);
      });

      const name = document.createElement('span');
      name.className = 'child-name';
      name.textContent = child.name;

      const meta = document.createElement('span');
      meta.className = 'child-meta';
      meta.innerHTML =
        (groupUsesMealGroups(group) ? '<span class="meal-badge">Essen ' + child.mealGroup + '</span>' : '') +
        (child.note && !isKitchenMode ? '<span class="note-preview"></span>' : '');
      const notePreview = meta.querySelector('.note-preview');
      if (notePreview) {
        notePreview.textContent = child.note;
      }

      main.appendChild(name);
      main.appendChild(meta);

      const editButton = document.createElement('button');
      editButton.type = 'button';
      editButton.className = 'child-edit-button';
      editButton.title = 'Kind bearbeiten und Notiz hinzufügen';
      editButton.innerHTML = '&#9998;';
      editButton.addEventListener('click', function() {
        openNote(groupId, child.id);
      });

      const statuses = document.createElement('div');
      statuses.className = 'status-buttons';
      [
        { key: 'present', label: 'Da', icon: '&#10003;' },
        { key: 'absent', label: 'Abwesend', icon: '&#8722;' },
        { key: 'picked', label: 'Abgeholt', icon: '&#8594;' }
      ].forEach(function(status) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'status-button ' + status.key + (child.status === status.key ? ' active' : '');
        btn.title = status.label;
        btn.innerHTML = status.icon;
        btn.addEventListener('click', function() {
          child.status = status.key;
          saveData();
          render();
        });
        statuses.appendChild(btn);
      });

      row.appendChild(main);
      if (canEditChild) {
        row.appendChild(editButton);
        row.appendChild(statuses);
      }
      return row;
    }

    function renderEditPanel() {
      els.roleStatus.textContent = roleLabel();
      els.editToggle.style.display = isKitchenMode ? 'none' : '';
      els.resetDayBtn.style.display = isKitchenMode ? 'none' : '';
      if (isKitchenMode) editing = false;
      els.editPanel.classList.toggle('visible', editing);
      els.editToggle.textContent = editing ? '✓' : '✎';
      els.editPanel.children[0].style.display = isAdminMode() ? 'grid' : 'none';
      els.newChildGroup.closest('.field').style.display = isGroupMode ? 'none' : 'grid';
      const selectedGroupForNewChild = data.groups.find(function(group) {
        return group.id === els.newChildGroup.value;
      }) || getVisibleGroups()[0];
      els.newChildMeal.closest('.field').style.display =
        selectedGroupForNewChild && groupUsesMealGroups(selectedGroupForNewChild) ? 'grid' : 'none';
      const selectedGroupId = els.newChildGroup.value;
      els.newChildGroup.innerHTML = '';

      getVisibleGroups().forEach(function(group) {
        const option = document.createElement('option');
        option.value = group.id;
        option.textContent = group.name;
        els.newChildGroup.appendChild(option);
      });

      if (getVisibleGroups().some(function(group) { return group.id === selectedGroupId; })) {
        els.newChildGroup.value = selectedGroupId;
      }

      els.editList.innerHTML = '';
      getVisibleGroups().forEach(function(group) {
        const isCollapsed = collapsedEditGroups[group.id] === true;
        const groupBox = document.createElement('section');
        groupBox.className = 'edit-group' + (isCollapsed ? ' collapsed' : '');

        const groupHead = document.createElement('div');
        groupHead.className = 'edit-group-head';
        groupHead.innerHTML =
          '<button class="collapse-button" type="button" title="Kinder ein- oder ausklappen"></button>' +
          '<input aria-label="Gruppenname" value="">' +
          '<select aria-label="Bereich"></select>' +
          '<div class="edit-child-actions"><button class="small-button" type="button">L&ouml;schen</button></div>';

        const collapseButton = groupHead.querySelector('.collapse-button');
        const groupInput = groupHead.querySelector('input');
        const areaSelect = groupHead.querySelector('select');
        const deleteGroupButton = groupHead.querySelector('.small-button');

        collapseButton.textContent = isCollapsed ? '+' : '-';
        collapseButton.addEventListener('click', function() {
          collapsedEditGroups[group.id] = !isCollapsed;
          renderEditPanel();
        });

        groupInput.value = group.name;
        groupInput.disabled = !isAdminMode();
        groupInput.addEventListener('change', function() {
          group.name = groupInput.value.trim() || group.name;
          if (!group.areaKey) {
            const area = areaForGroup(group);
            if (area) group.areaKey = area.key;
          }
          saveData();
          render();
        });

        areaSelect.innerHTML = '<option value="">Kein Bereich</option>' + AREAS.map(function(area) {
          return '<option value="' + area.key + '">' + area.name + ' (' + area.color + ')</option>';
        }).join('');
        areaSelect.value = group.areaKey || '';
        areaSelect.disabled = !isAdminMode();
        areaSelect.addEventListener('change', function() {
          group.areaKey = areaSelect.value;
          saveData();
          render();
        });

        deleteGroupButton.style.display = isAdminMode() ? '' : 'none';
        deleteGroupButton.addEventListener('click', function() {
          if (!confirm('Diese Gruppe mit allen Kindern löschen?')) return;
          data.groups = data.groups.filter(function(item) { return item.id !== group.id; });
          delete collapsedEditGroups[group.id];
          saveData();
          render();
        });

        const groupBody = document.createElement('div');
        groupBody.className = 'edit-group-body';

        if (group.children.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'Noch keine Kinder in dieser Gruppe';
          groupBody.appendChild(empty);
        }

        group.children.forEach(function(child) {
          const item = document.createElement('div');
          item.className = 'edit-child';
          item.innerHTML =
            '<div class="field-grid">' +
            '<input aria-label="Kindname" value="">' +
            '<select aria-label="Essensgruppe"><option value="1">Essen 1</option><option value="2">Essen 2</option></select>' +
            '</div>' +
            '<div class="edit-child-actions"><button class="small-button" type="button">Bearbeiten</button></div>';
          const nameInput = item.querySelector('input');
          const mealSelect = item.querySelector('select');
          nameInput.value = child.name;
          mealSelect.value = child.mealGroup;
          mealSelect.style.display = groupUsesMealGroups(group) ? '' : 'none';
          nameInput.addEventListener('change', function() {
            child.name = formatName(nameInput.value) || child.name;
            nameInput.value = child.name;
            saveData();
            render();
          });
          mealSelect.addEventListener('change', function() {
            child.mealGroup = mealSelect.value;
            saveData();
            render();
          });
          item.querySelector('button').addEventListener('click', function() {
            openNote(group.id, child.id);
          });
          groupBody.appendChild(item);
        });

        groupBox.appendChild(groupHead);
        groupBox.appendChild(groupBody);
        els.editList.appendChild(groupBox);
      });

      renderLinkList();
    }

    function renderLinkList() {
      els.linkList.innerHTML = '';
      els.linkList.style.display = isAdminMode() ? 'grid' : 'none';
      if (!isAdminMode()) return;

      const kitchenRow = document.createElement('div');
      kitchenRow.className = 'link-row';
      kitchenRow.innerHTML = '<span>Küche</span><input readonly value="">';
      kitchenRow.querySelector('input').value = linkFor('?ansicht=kueche');
      els.linkList.appendChild(kitchenRow);

      AREAS.forEach(function(area) {
        const row = document.createElement('div');
        row.className = 'link-row';
        row.innerHTML = '<span></span><input readonly value="">';
        row.querySelector('span').textContent = area.name + ' (' + area.color + ')';
        row.querySelector('input').value = linkFor('?bereich=' + encodeURIComponent(area.key));
        els.linkList.appendChild(row);
      });

      data.groups.forEach(function(group) {
        const row = document.createElement('div');
        row.className = 'link-row';
        row.innerHTML = '<span></span><input readonly value="">';
        row.querySelector('span').textContent = group.name;
        row.querySelector('input').value = linkFor('?gruppe=' + encodeURIComponent(group.shareKey));
        els.linkList.appendChild(row);
      });
    }

    function render() {
      updateDate();
      renderSummary();
      renderKitchenPanel();
      renderGroups();
      renderEditPanel();
    }

    function findChild(groupId, childId) {
      const group = data.groups.find(function(item) { return item.id === groupId; });
      if (!group) return null;
      const child = group.children.find(function(item) { return item.id === childId; });
      return child ? { group: group, child: child } : null;
    }

    function openNote(groupId, childId) {
      const found = findChild(groupId, childId);
      if (!found) return;
      activeNote = { groupId: groupId, childId: childId };
      els.noteTitle.textContent = found.child.name;
      els.noteText.value = found.child.note || '';
      els.noteDialog.classList.add('visible');
    }

    function closeNote() {
      activeNote = null;
      els.noteDialog.classList.remove('visible');
    }

    function addGroup() {
      const name = els.newGroupName.value.trim();
      if (!name) return;
      data.groups.push({ id: uid(), name: name, shareKey: makeShareKey(name), children: [] });
      els.newGroupName.value = '';
      saveData();
      render();
    }

    function addChild() {
      const name = formatName(els.newChildName.value);
      const group = data.groups.find(function(item) { return item.id === els.newChildGroup.value; });
      if (!name || !group) return;
      group.children.push({
        id: uid(),
        name: name,
        status: 'absent',
        mealGroup: groupUsesMealGroups(group) ? els.newChildMeal.value : '',
        eats: true,
        note: ''
      });
      collapsedEditGroups[group.id] = false;
      els.newChildName.value = '';
      els.newChildName.focus();
      saveData();
      render();
    }

    function resetDay() {
      if (!confirm('Alle Kinder in dieser Ansicht wieder auf "abwesend" setzen?')) return;
      getVisibleGroups().forEach(function(group) {
        group.children.forEach(function(child) {
          child.status = 'absent';
        });
      });
      data.lastReset = todayKey();
      saveData();
      render();
    }

    els.editToggle.addEventListener('click', function() {
      editing = !editing;
      render();
    });

    els.addGroupBtn.addEventListener('click', addGroup);
    els.addChildBtn.addEventListener('click', addChild);
    els.resetDayBtn.addEventListener('click', resetDay);
    els.newChildGroup.addEventListener('change', renderEditPanel);

    els.newGroupName.addEventListener('keydown', function(event) {
      if (event.key === 'Enter') addGroup();
    });

    els.newChildName.addEventListener('keydown', function(event) {
      if (event.key === 'Enter') addChild();
    });

    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        filter = tab.dataset.filter;
        document.querySelectorAll('.tab').forEach(function(item) {
          item.classList.toggle('active', item === tab);
        });
        renderGroups();
      });
    });

    els.closeNoteBtn.addEventListener('click', closeNote);
    els.noteDialog.addEventListener('click', function(event) {
      if (event.target === els.noteDialog) closeNote();
    });

    els.saveNoteBtn.addEventListener('click', function() {
      if (!activeNote) return;
      const found = findChild(activeNote.groupId, activeNote.childId);
      if (!found) return;
      found.child.note = els.noteText.value.trim();
      saveData();
      closeNote();
      render();
    });

    els.noteText.addEventListener('keydown', function(event) {
      if (event.key !== 'Enter' || event.shiftKey) return;
      event.preventDefault();
      els.saveNoteBtn.click();
    });

    els.deleteChildBtn.addEventListener('click', function() {
      if (!activeNote) return;
      const found = findChild(activeNote.groupId, activeNote.childId);
      if (!found || !confirm('Dieses Kind löschen?')) return;
      found.group.children = found.group.children.filter(function(child) {
        return child.id !== activeNote.childId;
      });
      saveData();
      closeNote();
      render();
    });

    document.querySelectorAll('input, select, textarea').forEach(function(input) {
      input.addEventListener('focus', function() {
        keepInputVisible(input);
      });
    });

    updateAppHeight();
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', updateAppHeight);
      window.visualViewport.addEventListener('scroll', updateAppHeight);
    } else {
      window.addEventListener('resize', updateAppHeight);
    }

    resetIfNewDay();
    applyMobileDefaults();
    render();
    loadCloudData();
    setInterval(pollCloudData, 4000);
  </script>
</body>
</html>
